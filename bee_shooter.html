<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>星际蜂巢 - Space Hive</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  overflow: hidden; 
  background: #000; 
  display: flex; 
  justify-content: center; 
  align-items: center; 
  height: 100vh; 
  font-family: 'Arial', 'Microsoft YaHei', sans-serif; 
}
canvas { display: block; cursor: none; }

#ui {
  position: fixed; top: 20px; left: 20px;
  color: #0ff; font-size: 18px; font-weight: bold;
  text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
  pointer-events: none; z-index: 10;
  background: rgba(0, 20, 40, 0.7);
  padding: 15px 20px;
  border: 1px solid rgba(0, 255, 255, 0.3);
  border-radius: 10px;
  backdrop-filter: blur(5px);
}
#ui div { margin: 5px 0; }
#ui span { color: #fff; text-shadow: 0 0 5px #fff; }

#timer {
  position: fixed; top: 20px; right: 20px;
  color: #0ff; font-size: 28px; font-weight: bold;
  text-shadow: 0 0 15px #0ff;
  pointer-events: none; z-index: 10;
  background: rgba(0, 20, 40, 0.7);
  padding: 15px 25px;
  border: 1px solid rgba(0, 255, 255, 0.3);
  border-radius: 10px;
  backdrop-filter: blur(5px);
}

#gameOver, #startScreen, #levelUp {
  position: fixed; inset: 0;
  background: rgba(0, 0, 0, 0.85);
  display: none; align-items: center; justify-content: center;
  z-index: 20;
  backdrop-filter: blur(10px);
}
#startScreen {
  display: flex;
}
#gameOver .content, #startScreen .content, #levelUp .content {
  text-align: center; color: #fff;
  background: linear-gradient(135deg, rgba(0, 40, 80, 0.9), rgba(0, 20, 40, 0.95));
  padding: 40px 60px;
  border-radius: 20px;
  border: 2px solid rgba(0, 255, 255, 0.4);
  box-shadow: 0 0 50px rgba(0, 255, 255, 0.3), inset 0 0 30px rgba(0, 100, 150, 0.2);
}
#gameOver h1, #startScreen h1, #levelUp h1 { 
  font-size: 42px; margin-bottom: 25px; 
  text-shadow: 0 0 20px currentColor;
}
#gameOver p, #startScreen p, #levelUp p { 
  font-size: 18px; margin-bottom: 15px; line-height: 1.8; 
  color: #aaa;
}
#startScreen h1 { color: #0ff; }
#gameOver h1 { color: #f44; }
#levelUp h1 { color: #0f0; }

.btn {
  padding: 15px 50px; font-size: 18px;
  background: linear-gradient(135deg, #0ff, #08f);
  border: none; border-radius: 30px;
  cursor: pointer; color: #000; font-weight: bold;
  text-transform: uppercase; letter-spacing: 2px;
  box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
  transition: all 0.3s ease;
}
.btn:hover { 
  transform: scale(1.05); 
  box-shadow: 0 0 50px rgba(0, 255, 255, 0.8);
}
.btn-green { background: linear-gradient(135deg, #0f0, #0a0); box-shadow: 0 0 30px rgba(0, 255, 0, 0.5); }

.bee-type { display: inline-block; padding: 3px 10px; border-radius: 5px; margin: 2px; }
.bee-normal { background: rgba(100, 149, 237, 0.3); color: #6495ED; }
.bee-golden { background: rgba(255, 215, 0, 0.3); color: #FFD700; }
.bee-red { background: rgba(255, 69, 0, 0.3); color: #FF4500; }
.bee-darkred { background: rgba(139, 0, 0, 0.3); color: #CD5C5C; }
.powerup-triple { background: rgba(0, 191, 255, 0.3); color: #00BFFF; }
.powerup-onehit { background: rgba(255, 0, 255, 0.3); color: #FF00FF; }
</style>
</head>
<body>

<div id="ui">
  <div>关卡: <span id="level">1</span></div>
  <div>得分: <span id="score">0</span></div>
  <div>生命: <span id="lives">3</span></div>
  <div>敌机: <span id="remaining">0</span></div>
</div>

<div id="timer">⏱ <span id="timeLeft">60</span>s</div>

<div id="startScreen">
  <div class="content">
    <h1>⭐ 星际蜂巢 ⭐</h1>
    <p>
      移动鼠标控制战机<br>
      自动发射能量弹消灭外星蜂群！<br><br>
      <span class="bee-type bee-normal">蓝灰蜂</span> 普通敌人，1发击杀<br>
      <span class="bee-type bee-golden">金甲蜂</span> 强化装甲，2发击杀<br>
      <span class="bee-type bee-red">赤焰蜂</span> 重型装甲，3发击杀<br>
      <span class="bee-type bee-darkred">暗影蜂</span> 超重装甲，5发击杀<br><br>
      击杀掉落道具：<br>
      <span class="powerup-triple">三连发</span> 扇形射击，持续5秒<br>
      <span class="powerup-onehit">穿透弹</span> 一击必杀，持续5秒<br>
      <span style="color: #FF4500;">💣 炸弹</span> 危险！拾取会损失生命<br>
    </p>
    <button class="btn" onclick="startGame()">开始战斗</button>
    <div style="color: rgba(255,255,255,0.2); font-size: 12px; letter-spacing: 3px; margin-top: 15px; text-align: center;">DEVELOPED BY SHAIFX</div>
  </div>
</div>

<div id="gameOver">
  <div class="content">
    <h1 id="endTitle">任务失败</h1>
    <p id="endMessage"></p>
    <button class="btn" onclick="restartGame()">重新开始</button>
  </div>
</div>

<div id="levelUp">
  <div class="content">
    <h1 id="levelUpTitle">✓ 关卡完成</h1>
    <p id="levelUpMessage"></p>
    <button class="btn btn-green" onclick="goToNextLevel()" style="margin-top: 20px;">进入下一关</button>
  </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ========== 音频系统 ==========
let audioCtx = null;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

// 击中音效 - 更柔和
function playHitSound() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  
  osc.type = 'sine';
  osc.frequency.setValueAtTime(400, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.08);
  
  gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
  
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.08);
}

// 击杀音效 - 爆炸感
function playKillSound() {
  if (!audioCtx) return;
  // 噪声爆炸
  const bufferSize = audioCtx.sampleRate * 0.2;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
  }
  
  const noise = audioCtx.createBufferSource();
  noise.buffer = buffer;
  
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(2000, audioCtx.currentTime);
  filter.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);
  
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
  
  noise.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);
  noise.start();
}

// 拾取道具音效
function playPickupSound() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  
  osc.type = 'sine';
  osc.frequency.setValueAtTime(400, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
  osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.2);
  
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
  
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.25);
}

// 发射音效
function playShootSound() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(800, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.05);
  
  gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
  
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.05);
}

// 受伤音效
function playDamageSound() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(200, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
  
  gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
  
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.3);
}

// ========== 游戏状态 ==========
let gameRunning = false;
let waitingForNextLevel = false;
let score = 0;
let lives = 3;
let timeLeft = 60;
let frameCount = 0;
let lastTimeUpdate = 0;

// 屏幕震动
let screenShake = 0;
let shakeX = 0;
let shakeY = 0;

// 关卡系统
let level = 1;
let goldenRows = 0;
let redRows = 0;
let darkRedRows = 0;
let isAllRed = false;
let isAllDarkRed = false;

// 子弹属性
let baseBulletSpeed = 12;
let baseShootInterval = 35;
let bulletSpeedMultiplier = 1;
let shootIntervalMultiplier = 1;

// 道具系统
let powerups = [];
let tripleShotActive = false;
let tripleShotEndTime = 0;
let oneHitKillActive = false;
let oneHitKillEndTime = 0;

// 攻击蜜蜂
let attackingBee = null;
let attackCooldown = 0;
let nextAttackDelay = 90;

// 玩家
const player = {
  x: canvas.width / 2,
  y: canvas.height - 100,
  width: 50,
  height: 50,
  engineGlow: 0
};

// 子弹
let bullets = [];
let enemyBullets = [];
let bees = [];
let particles = [];

// 星空背景
let stars = [];
let nebulae = [];
let shootingStars = [];

// 初始化星空
function initStars() {
  stars = [];
  nebulae = [];
  shootingStars = [];
  
  // 创建星星
  for (let i = 0; i < 200; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 2 + 0.5,
      speed: Math.random() * 0.5 + 0.1,
      brightness: Math.random(),
      twinkleSpeed: Math.random() * 0.05 + 0.02
    });
  }
  
  // 创建星云
  for (let i = 0; i < 5; i++) {
    nebulae.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      radius: Math.random() * 200 + 100,
      color: ['rgba(100, 0, 150, 0.1)', 'rgba(0, 100, 150, 0.1)', 'rgba(150, 0, 100, 0.1)', 'rgba(0, 50, 100, 0.1)'][Math.floor(Math.random() * 4)],
      drift: Math.random() * 0.2 - 0.1
    });
  }
}

// 事件监听
document.addEventListener('keydown', (e) => {
  if (e.code === 'Escape' && gameRunning) {
    gameRunning = false;
    document.getElementById('startScreen').style.display = 'flex';
    document.getElementById('gameOver').style.display = 'none';
  }
});

canvas.addEventListener('mousemove', (e) => {
  if (!gameRunning) return;
  player.x = e.clientX;
  player.y = e.clientY;
  player.x = Math.max(player.width / 2, Math.min(canvas.width - player.width / 2, player.x));
  player.y = Math.max(player.height / 2, Math.min(canvas.height - player.height / 2, player.y));
});

canvas.addEventListener('click', () => {
  if (waitingForNextLevel) goToNextLevel();
});

// ========== 绘制函数 ==========

// 绘制星空背景
function drawBackground() {
  // 深空渐变
  const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
  gradient.addColorStop(0, '#000510');
  gradient.addColorStop(0.5, '#001020');
  gradient.addColorStop(1, '#000815');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // 星云
  nebulae.forEach(n => {
    n.x += n.drift;
    if (n.x < -n.radius) n.x = canvas.width + n.radius;
    if (n.x > canvas.width + n.radius) n.x = -n.radius;
    
    const nebulaGradient = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.radius);
    nebulaGradient.addColorStop(0, n.color);
    nebulaGradient.addColorStop(1, 'transparent');
    ctx.fillStyle = nebulaGradient;
    ctx.fillRect(n.x - n.radius, n.y - n.radius, n.radius * 2, n.radius * 2);
  });
  
  // 星星
  stars.forEach(star => {
    star.y += star.speed;
    star.brightness = 0.5 + Math.sin(frameCount * star.twinkleSpeed) * 0.5;
    
    if (star.y > canvas.height) {
      star.y = 0;
      star.x = Math.random() * canvas.width;
    }
    
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 255, 255, ${star.brightness})`;
    ctx.fill();
    
    // 星芒
    if (star.size > 1.5) {
      ctx.strokeStyle = `rgba(200, 220, 255, ${star.brightness * 0.5})`;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(star.x - star.size * 2, star.y);
      ctx.lineTo(star.x + star.size * 2, star.y);
      ctx.moveTo(star.x, star.y - star.size * 2);
      ctx.lineTo(star.x, star.y + star.size * 2);
      ctx.stroke();
    }
  });
  
  // 流星
  if (Math.random() < 0.005) {
    shootingStars.push({
      x: Math.random() * canvas.width,
      y: 0,
      speed: Math.random() * 10 + 15,
      length: Math.random() * 50 + 30,
      life: 60
    });
  }
  
  shootingStars = shootingStars.filter(s => {
    s.x += s.speed * 0.7;
    s.y += s.speed;
    s.life--;
    
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(s.x - s.length * 0.7, s.y - s.length);
    ctx.strokeStyle = `rgba(255, 255, 255, ${s.life / 60})`;
    ctx.lineWidth = 2;
    ctx.stroke();
    
    return s.life > 0 && s.y < canvas.height;
  });
}

// 绘制精致战机
function drawPlane(x, y) {
  ctx.save();
  ctx.translate(x, y);
  
  // 引擎光效
  player.engineGlow = (player.engineGlow + 0.1) % (Math.PI * 2);
  const engineIntensity = 0.7 + Math.sin(player.engineGlow * 3) * 0.3;
  
  // 主引擎火焰
  const flameGradient = ctx.createLinearGradient(0, 20, 0, 50);
  flameGradient.addColorStop(0, `rgba(0, 200, 255, ${engineIntensity})`);
  flameGradient.addColorStop(0.3, `rgba(100, 150, 255, ${engineIntensity * 0.7})`);
  flameGradient.addColorStop(1, 'transparent');
  ctx.fillStyle = flameGradient;
  ctx.beginPath();
  ctx.moveTo(-8, 20);
  ctx.lineTo(0, 35 + Math.random() * 10);
  ctx.lineTo(8, 20);
  ctx.closePath();
  ctx.fill();
  
  // 机翼光晕
  ctx.shadowColor = oneHitKillActive ? '#FF00FF' : (tripleShotActive ? '#00BFFF' : '#00FFFF');
  ctx.shadowBlur = 20;
  
  // 机身主体
  const bodyGradient = ctx.createLinearGradient(-20, 0, 20, 0);
  if (oneHitKillActive) {
    bodyGradient.addColorStop(0, '#660066');
    bodyGradient.addColorStop(0.5, '#FF00FF');
    bodyGradient.addColorStop(1, '#660066');
  } else if (tripleShotActive) {
    bodyGradient.addColorStop(0, '#004466');
    bodyGradient.addColorStop(0.5, '#00BFFF');
    bodyGradient.addColorStop(1, '#004466');
  } else {
    bodyGradient.addColorStop(0, '#003366');
    bodyGradient.addColorStop(0.5, '#0088CC');
    bodyGradient.addColorStop(1, '#003366');
  }
  
  // 主机身
  ctx.fillStyle = bodyGradient;
  ctx.beginPath();
  ctx.moveTo(0, -25);
  ctx.lineTo(-8, -10);
  ctx.lineTo(-6, 15);
  ctx.lineTo(0, 20);
  ctx.lineTo(6, 15);
  ctx.lineTo(8, -10);
  ctx.closePath();
  ctx.fill();
  
  // 机翼
  ctx.fillStyle = oneHitKillActive ? '#990099' : (tripleShotActive ? '#006699' : '#004477');
  ctx.beginPath();
  ctx.moveTo(-6, 0);
  ctx.lineTo(-30, 15);
  ctx.lineTo(-25, 18);
  ctx.lineTo(-6, 10);
  ctx.closePath();
  ctx.fill();
  
  ctx.beginPath();
  ctx.moveTo(6, 0);
  ctx.lineTo(30, 15);
  ctx.lineTo(25, 18);
  ctx.lineTo(6, 10);
  ctx.closePath();
  ctx.fill();
  
  // 驾驶舱
  const cockpitGradient = ctx.createRadialGradient(0, -10, 0, 0, -10, 8);
  cockpitGradient.addColorStop(0, '#66FFFF');
  cockpitGradient.addColorStop(1, '#006688');
  ctx.fillStyle = cockpitGradient;
  ctx.beginPath();
  ctx.ellipse(0, -10, 5, 8, 0, 0, Math.PI * 2);
  ctx.fill();
  
  // 武器挂载点
  ctx.fillStyle = '#333';
  ctx.fillRect(-25, 12, 8, 4);
  ctx.fillRect(17, 12, 8, 4);
  
  ctx.shadowBlur = 0;
  ctx.restore();
}

// 绘制外星蜜蜂
function drawBee(bee) {
  ctx.save();
  ctx.translate(bee.x, bee.y);
  
  // 确定颜色
  let bodyColor, glowColor, eyeColor;
  if (bee.colorState === 'darkred') {
    bodyColor = '#8B0000';
    glowColor = '#FF3333';
    eyeColor = '#FF0000';
  } else if (bee.colorState === 'red') {
    bodyColor = '#CC3300';
    glowColor = '#FF6600';
    eyeColor = '#FF4400';
  } else if (bee.colorState === 'golden') {
    bodyColor = '#CC9900';
    glowColor = '#FFCC00';
    eyeColor = '#FFAA00';
  } else {
    bodyColor = '#4466AA';
    glowColor = '#6699FF';
    eyeColor = '#88BBFF';
  }
  
  // 发光效果
  ctx.shadowColor = glowColor;
  ctx.shadowBlur = 15;
  
  // 翅膀动画
  const wingOffset = Math.sin(frameCount * 0.4) * 8;
  
  // 翅膀
  ctx.fillStyle = `rgba(200, 220, 255, 0.4)`;
  ctx.beginPath();
  ctx.ellipse(-15, -8 + wingOffset * 0.5, 12, 6, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(15, -8 - wingOffset * 0.5, 12, 6, 0.3, 0, Math.PI * 2);
  ctx.fill();
  
  // 身体渐变
  const bodyGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, 18);
  bodyGradient.addColorStop(0, glowColor);
  bodyGradient.addColorStop(0.5, bodyColor);
  bodyGradient.addColorStop(1, '#111');
  
  // 腹部
  ctx.fillStyle = bodyGradient;
  ctx.beginPath();
  ctx.ellipse(0, 5, 12, 15, 0, 0, Math.PI * 2);
  ctx.fill();
  
  // 胸部
  ctx.beginPath();
  ctx.ellipse(0, -8, 10, 10, 0, 0, Math.PI * 2);
  ctx.fill();
  
  // 条纹
  ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
  ctx.fillRect(-10, 0, 20, 3);
  ctx.fillRect(-10, 8, 20, 3);
  
  // 眼睛
  ctx.shadowBlur = 10;
  ctx.shadowColor = eyeColor;
  ctx.fillStyle = eyeColor;
  ctx.beginPath();
  ctx.arc(-5, -12, 4, 0, Math.PI * 2);
  ctx.arc(5, -12, 4, 0, Math.PI * 2);
  ctx.fill();
  
  // 瞳孔
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(-5, -12, 2, 0, Math.PI * 2);
  ctx.arc(5, -12, 2, 0, Math.PI * 2);
  ctx.fill();
  
  // 尾刺
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.moveTo(0, 20);
  ctx.lineTo(-4, 25);
  ctx.lineTo(0, 35);
  ctx.lineTo(4, 25);
  ctx.closePath();
  ctx.fill();
  
  // 血量显示
  if (bee.hitsToKill > 1) {
    const hitsRemaining = bee.hitsToKill - bee.currentHits;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 14px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(hitsRemaining.toString(), 0, 8);
  }
  
  ctx.restore();
}

// 创建蜜蜂队列
function createBeeFormation() {
  bees = [];
  const rows = 4;
  const cols = 8;
  const spacingX = 80;
  const spacingY = 60;
  const startX = (canvas.width - (cols - 1) * spacingX) / 2;
  const startY = 100;

  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      let colorState = 'normal';
      let hitsToKill = 1;

      if (isAllDarkRed) {
        colorState = 'darkred';
        hitsToKill = 5;
      } else if (row < darkRedRows) {
        colorState = 'darkred';
        hitsToKill = 5;
      } else if (isAllRed || row < redRows) {
        colorState = 'red';
        hitsToKill = 3;
      } else if (row < goldenRows) {
        colorState = 'golden';
        hitsToKill = 2;
      }

      bees.push({
        x: startX + col * spacingX,
        y: startY + row * spacingY,
        width: 35,
        height: 35,
        baseX: startX + col * spacingX,
        baseY: startY + row * spacingY,
        wobble: Math.random() * Math.PI * 2,
        alive: true,
        row: row,
        colorState: colorState,
        hitsToKill: hitsToKill,
        currentHits: 0,
        isAttacking: false,
        attackSpeed: 5,
        attackState: 'idle',
        lastShotTime: 0
      });
    }
  }
}

function selectAttackingBee() {
  const aliveBees = bees.filter(bee => bee.alive && !bee.isAttacking);
  if (aliveBees.length === 0) return null;
  const bee = aliveBees[Math.floor(Math.random() * aliveBees.length)];
  bee.isAttacking = true;
  bee.attackState = 'diving';
  bee.attackStartTime = performance.now(); // 记录攻击开始时间
  return bee;
}

// 发射子弹
function shoot() {
  playShootSound();
  const actualSpeed = baseBulletSpeed * bulletSpeedMultiplier;
  const isBig = oneHitKillActive;
  const bw = isBig ? 10 : 5;
  const bh = isBig ? 25 : 15;

  if (tripleShotActive) {
    const angle20 = 20 * Math.PI / 180;
    bullets.push({ x: player.x, y: player.y - 30, width: bw, height: bh, vx: 0, vy: -actualSpeed, speed: actualSpeed, isOneHitKill: oneHitKillActive });
    bullets.push({ x: player.x, y: player.y - 30, width: bw, height: bh, vx: -actualSpeed * Math.sin(angle20), vy: -actualSpeed * Math.cos(angle20), speed: actualSpeed, isOneHitKill: oneHitKillActive });
    bullets.push({ x: player.x, y: player.y - 30, width: bw, height: bh, vx: actualSpeed * Math.sin(angle20), vy: -actualSpeed * Math.cos(angle20), speed: actualSpeed, isOneHitKill: oneHitKillActive });
  } else {
    bullets.push({ x: player.x, y: player.y - 30, width: bw, height: bh, vx: 0, vy: -actualSpeed, speed: actualSpeed, isOneHitKill: oneHitKillActive });
  }
}

// 创建爆炸
function createExplosion(x, y, color, count = 25) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
    const speed = Math.random() * 6 + 3;
    particles.push({
      x: x,
      y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 40 + Math.random() * 20,
      maxLife: 60,
      color: color,
      size: Math.random() * 4 + 2
    });
  }
  // 屏幕震动
  screenShake = 10;
}

// 掉落道具
function tryDropPowerup(x, y) {
  const rand = Math.random();
  if (rand < 0.1) {
    powerups.push({ x, y, type: 'triple', width: 28, height: 28, speed: 2, rotation: 0 });
  } else if (rand < 0.2) {
    powerups.push({ x, y, type: 'onehit', width: 28, height: 28, speed: 2, rotation: 0 });
  } else if (rand < 0.23) {
    powerups.push({ x, y, type: 'life', width: 28, height: 28, speed: 2, rotation: 0 });
  } else if (rand < 0.26) {
    // 3%概率：炸弹
    powerups.push({ x, y, type: 'bomb', width: 28, height: 28, speed: 2, rotation: 0 });
  }
}

// 绘制道具
function drawPowerup(pu) {
  ctx.save();
  ctx.translate(pu.x, pu.y);
  pu.rotation += 0.03;

  const glowSize = 20 + Math.sin(frameCount * 0.1) * 4;
  
  if (pu.type === 'triple') {
    ctx.shadowColor = '#00BFFF';
    ctx.shadowBlur = 20;
    ctx.fillStyle = 'rgba(0, 191, 255, 0.8)';
    ctx.beginPath();
    ctx.arc(0, 0, glowSize, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.fillRect(-9, -7, 5, 14);
    ctx.fillRect(-2, -7, 5, 14);
    ctx.fillRect(5, -7, 5, 14);
  } else if (pu.type === 'onehit') {
    ctx.shadowColor = '#FF00FF';
    ctx.shadowBlur = 20;
    ctx.fillStyle = 'rgba(255, 0, 255, 0.8)';
    ctx.beginPath();
    ctx.arc(0, 0, glowSize, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.moveTo(-2, -10);
    ctx.lineTo(6, -2);
    ctx.lineTo(0, -2);
    ctx.lineTo(3, 10);
    ctx.lineTo(-5, 2);
    ctx.lineTo(0, 2);
    ctx.closePath();
    ctx.fill();
  } else if (pu.type === 'life') {
    ctx.shadowColor = '#FF0000';
    ctx.shadowBlur = 20;
    ctx.fillStyle = 'rgba(255, 50, 50, 0.8)';
    ctx.beginPath();
    ctx.arc(0, 0, glowSize, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.moveTo(0, 8);
    ctx.bezierCurveTo(-12, -2, -12, -12, 0, -8);
    ctx.bezierCurveTo(12, -12, 12, -2, 0, 8);
    ctx.fill();
  } else if (pu.type === 'bomb') {
    // 炸弹：黑色圆形炸弹
    ctx.shadowColor = '#FF4500';
    ctx.shadowBlur = 20;
    ctx.fillStyle = 'rgba(40, 40, 40, 0.9)';
    ctx.beginPath();
    ctx.arc(0, 0, glowSize * 0.8, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    // 炸弹图标
    ctx.fillStyle = '#FF4500';
    ctx.beginPath();
    ctx.arc(0, 0, 8, 0, Math.PI * 2);
    ctx.fill();
    // 引信
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, -glowSize * 0.6);
    ctx.lineTo(0, -glowSize * 0.8);
    ctx.stroke();
    // 火花
    ctx.fillStyle = '#FF0000';
    ctx.beginPath();
    ctx.arc(0, -glowSize * 0.85, 4 + Math.sin(frameCount * 0.3) * 2, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

// 更新游戏
function update() {
  frameCount++;
  const now = performance.now();

  // 道具计时
  if (tripleShotActive && now >= tripleShotEndTime) tripleShotActive = false;
  if (oneHitKillActive && now >= oneHitKillEndTime) oneHitKillActive = false;

  // 屏幕震动
  if (screenShake > 0) {
    shakeX = (Math.random() - 0.5) * screenShake;
    shakeY = (Math.random() - 0.5) * screenShake;
    screenShake *= 0.9;
    if (screenShake < 0.5) screenShake = 0;
  }

  // 发射
  const actualShootInterval = Math.floor(baseShootInterval / shootIntervalMultiplier);
  if (frameCount % actualShootInterval === 0) shoot();

  // 时间
  if (now - lastTimeUpdate >= 1000) {
    timeLeft--;
    lastTimeUpdate = now;
    document.getElementById('timeLeft').textContent = timeLeft;
    if (timeLeft <= 0) { gameOver(false); return; }
  }

  // 更新子弹
  bullets = bullets.filter(b => {
    b.x += b.vx || 0;
    b.y += b.vy || -b.speed;
    return b.y > -30 && b.x > -30 && b.x < canvas.width + 30;
  });

  // 更新道具
  powerups = powerups.filter(pu => {
    pu.y += pu.speed;
    if (Math.abs(pu.x - player.x) < 35 && Math.abs(pu.y - player.y) < 35) {
      if (pu.type === 'triple') { 
        playPickupSound();
        tripleShotActive = true; tripleShotEndTime = now + 5000; 
        createExplosion(pu.x, pu.y, '#00BFFF', 15);
      } else if (pu.type === 'onehit') { 
        playPickupSound();
        oneHitKillActive = true; oneHitKillEndTime = now + 5000; 
        createExplosion(pu.x, pu.y, '#FF00FF', 15);
      } else if (pu.type === 'life') { 
        playPickupSound();
        lives++; document.getElementById('lives').textContent = lives; 
        createExplosion(pu.x, pu.y, '#FF0000', 15);
      } else if (pu.type === 'bomb') {
        // 炸弹：减少一条生命
        playDamageSound();
        lives--;
        document.getElementById('lives').textContent = lives;
        createExplosion(pu.x, pu.y, '#FF4500', 40);
        screenShake = 25;
        if (lives <= 0) gameOver(false);
      }
      return false;
    }
    return pu.y < canvas.height + 50;
  });

  // 蜜蜂攻击
  if (attackingBee) {
    if (attackingBee.attackState === 'diving') {
      const dx = player.x - attackingBee.x;
      const dy = player.y - attackingBee.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      
      // 检查是否超过6秒，超时返回
      if (now - attackingBee.attackStartTime > 6000) {
        attackingBee.attackState = 'returning';
      }
      
      if (attackingBee.attackState === 'diving') {
        if (now - attackingBee.lastShotTime > 1200) {
          attackingBee.lastShotTime = now;
          enemyBullets.push({
            x: attackingBee.x, y: attackingBee.y + 20,
            vx: (dx / dist) * 6, vy: (dy / dist) * 6,
            width: 8, height: 12
          });
        }
        
        if (dist < 35) {
          createExplosion(attackingBee.x, attackingBee.y, '#FF4444', 30);
          playDamageSound();
          attackingBee.alive = false;
          attackingBee.isAttacking = false;
          attackingBee = null;
          attackCooldown = nextAttackDelay;
          lives--;
          document.getElementById('lives').textContent = lives;
          screenShake = 20;
          if (lives <= 0) { gameOver(false); return; }
        } else {
          attackingBee.x += (dx / dist) * attackingBee.attackSpeed;
          attackingBee.y += (dy / dist) * attackingBee.attackSpeed;
          attackingBee.x = Math.max(30, Math.min(canvas.width - 30, attackingBee.x));
        }
      }
    } else if (attackingBee.attackState === 'returning') {
      const dx = attackingBee.baseX - attackingBee.x;
      const dy = attackingBee.baseY - attackingBee.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 5) {
        attackingBee.isAttacking = false;
        attackingBee.attackState = 'idle';
        attackingBee.x = attackingBee.baseX;
        attackingBee.y = attackingBee.baseY;
        attackingBee = null;
        attackCooldown = nextAttackDelay;
      } else {
        attackingBee.x += (dx / dist) * 3;
        attackingBee.y += (dy / dist) * 3;
      }
    }
  } else {
    if (attackCooldown > 0) attackCooldown--;
    else attackingBee = selectAttackingBee();
  }

  // 蜜蜂漂浮
  bees.forEach(bee => {
    if (!bee.alive || bee.isAttacking) return;
    bee.wobble += 0.025;
    bee.x = bee.baseX + Math.sin(bee.wobble) * 12;
    bee.y = bee.baseY + Math.cos(bee.wobble * 0.7) * 6;
  });

  // 敌人子弹
  enemyBullets = enemyBullets.filter(b => {
    b.x += b.vx;
    b.y += b.vy;
    if (Math.abs(b.x - player.x) < 30 && Math.abs(b.y - player.y) < 30) {
      createExplosion(player.x, player.y, '#FF0000', 20);
      playDamageSound();
      lives--;
      document.getElementById('lives').textContent = lives;
      screenShake = 25;
      if (lives <= 0) gameOver(false);
      return false;
    }
    return b.y < canvas.height + 30 && b.y > -30 && b.x > -30 && b.x < canvas.width + 30;
  });

  // 碰撞检测
  bullets.forEach((bullet, bi) => {
    bees.forEach(bee => {
      if (!bee.alive) return;
      if (bullet.x > bee.x - bee.width / 2 && bullet.x < bee.x + bee.width / 2 &&
          bullet.y > bee.y - bee.height / 2 && bullet.y < bee.y + bee.height / 2) {
        bullets.splice(bi, 1);
        bee.currentHits++;
        
        if (bullet.isOneHitKill || bee.currentHits >= bee.hitsToKill) {
          let explosionColor = bee.colorState === 'darkred' ? '#8B0000' : 
                               bee.colorState === 'red' ? '#FF4500' : 
                               bee.colorState === 'golden' ? '#FFD700' : '#6699FF';
          createExplosion(bee.x, bee.y, explosionColor, 35);
          playKillSound();
          
          if (bee === attackingBee) { attackingBee = null; attackCooldown = nextAttackDelay; }
          bee.alive = false;
          
          score += bee.colorState === 'darkred' ? 50 : bee.colorState === 'red' ? 30 : bee.colorState === 'golden' ? 20 : 10;
          updateUI();
          tryDropPowerup(bee.x, bee.y);
        } else {
          createExplosion(bee.x, bee.y, '#fff', 10);
          playHitSound();
        }
      }
    });
  });

  // 粒子
  particles = particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.98;
    p.vy *= 0.98;
    p.life--;
    return p.life > 0;
  });

  // 检查胜利
  if (bees.filter(b => b.alive).length === 0) showLevelComplete();
}

// 关卡完成
function showLevelComplete() {
  gameRunning = false;
  waitingForNextLevel = true;

  if (!isAllRed && !isAllDarkRed) {
    if (goldenRows < 4) goldenRows++;
    else { isAllRed = true; redRows = 1; bulletSpeedMultiplier = 1.5; shootIntervalMultiplier = 1.5; }
  } else if (isAllRed && !isAllDarkRed) {
    if (redRows < 4) redRows++;
    else { isAllDarkRed = true; darkRedRows = 1; bulletSpeedMultiplier = 2; shootIntervalMultiplier = 2; }
  } else if (isAllDarkRed) {
    if (darkRedRows < 4) darkRedRows++;
  }

  let nextInfo = isAllDarkRed ? `下一关：${darkRedRows}排暗影蜂（5发击杀）` :
                 isAllRed ? `下一关：${redRows}排赤焰蜂（3发击杀）` :
                 goldenRows > 0 ? `下一关：${goldenRows}排金甲蜂（2发击杀）` : '下一关：第1排变为金甲蜂';

  document.getElementById('levelUpMessage').innerHTML = `得分: ${score}<br>剩余生命: ${lives}<br>剩余时间: ${timeLeft}秒<br><br>${nextInfo}`;
  document.getElementById('levelUp').style.display = 'flex';
}

function goToNextLevel() {
  level++;
  waitingForNextLevel = false;
  gameRunning = true;
  timeLeft = 60;
  bullets = [];
  enemyBullets = [];
  particles = [];
  powerups = [];
  attackingBee = null;
  attackCooldown = 0;
  lastTimeUpdate = performance.now();
  createBeeFormation();
  document.getElementById('level').textContent = level;
  document.getElementById('timeLeft').textContent = timeLeft;
  document.getElementById('levelUp').style.display = 'none';
  updateUI();
  gameLoop();
}

// 渲染
function render() {
  ctx.save();
  ctx.translate(shakeX, shakeY);

  drawBackground();

  // 道具
  powerups.forEach(pu => drawPowerup(pu));

  // 子弹
  bullets.forEach(b => {
    ctx.save();
    if (b.isOneHitKill) {
      ctx.shadowColor = '#FF00FF';
      ctx.shadowBlur = 15;
      const grad = ctx.createLinearGradient(b.x, b.y - b.height, b.x, b.y);
      grad.addColorStop(0, '#FF00FF');
      grad.addColorStop(1, '#AA00AA');
      ctx.fillStyle = grad;
    } else if (tripleShotActive) {
      ctx.shadowColor = '#00BFFF';
      ctx.shadowBlur = 10;
      ctx.fillStyle = '#00BFFF';
    } else {
      ctx.shadowColor = '#00FFFF';
      ctx.shadowBlur = 8;
      ctx.fillStyle = '#00FFFF';
    }
    ctx.beginPath();
    ctx.ellipse(b.x, b.y, b.width / 2, b.height / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });

  // 敌人子弹
  enemyBullets.forEach(b => {
    ctx.save();
    ctx.shadowColor = '#00FF00';
    ctx.shadowBlur = 10;
    ctx.fillStyle = '#44FF44';
    ctx.beginPath();
    ctx.ellipse(b.x, b.y, b.width / 2, b.height / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });

  // 蜜蜂
  bees.forEach(bee => { if (bee.alive) drawBee(bee); });

  // 飞机
  drawPlane(player.x, player.y);

  // 粒子
  particles.forEach(p => {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 5;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * (p.life / p.maxLife), 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;

  // 状态提示
  if (isAllDarkRed) {
    ctx.fillStyle = '#8B0000';
    ctx.font = 'bold 16px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(`⚠ 暗影模式 ${darkRedRows}/4 - 火力×2`, canvas.width / 2, 35);
  } else if (isAllRed) {
    ctx.fillStyle = '#FF4500';
    ctx.font = 'bold 16px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(`🔥 赤焰模式 ${redRows}/4 - 火力×1.5`, canvas.width / 2, 35);
  } else if (goldenRows > 0) {
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 16px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(`⭐ 金甲模式 ${goldenRows}/4`, canvas.width / 2, 35);
  }

  // 道具状态条
  const now = performance.now();
  const barY = canvas.height - 50;

  if (tripleShotActive) {
    const remaining = Math.max(0, (tripleShotEndTime - now) / 1000);
    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
    ctx.fillRect(canvas.width / 2 - 230, barY, 200, 20);
    ctx.fillStyle = '#00BFFF';
    ctx.fillRect(canvas.width / 2 - 230, barY, 200 * (remaining / 5), 20);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(`三连发 ${remaining.toFixed(1)}s`, canvas.width / 2 - 130, barY + 14);
  }

  if (oneHitKillActive) {
    const remaining = Math.max(0, (oneHitKillEndTime - now) / 1000);
    const offsetX = tripleShotActive ? 240 : 0;
    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
    ctx.fillRect(canvas.width / 2 - 100 + offsetX, barY, 200, 20);
    ctx.fillStyle = '#FF00FF';
    ctx.fillRect(canvas.width / 2 - 100 + offsetX, barY, 200 * (remaining / 5), 20);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(`穿透弹 ${remaining.toFixed(1)}s`, canvas.width / 2 + offsetX, barY + 14);
  }

  ctx.restore();
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('lives').textContent = lives;
  document.getElementById('remaining').textContent = bees.filter(b => b.alive).length;
}

function gameLoop() {
  if (!gameRunning) return;
  update();
  render();
  requestAnimationFrame(gameLoop);
}

function startGame() {
  initAudio();
  initStars();
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('levelUp').style.display = 'none';
  gameRunning = true;
  waitingForNextLevel = false;
  score = 0;
  lives = 3;
  timeLeft = 60;
  level = 1;
  goldenRows = 0;
  redRows = 0;
  darkRedRows = 0;
  isAllRed = false;
  isAllDarkRed = false;
  bulletSpeedMultiplier = 1;
  shootIntervalMultiplier = 1;
  tripleShotActive = false;
  oneHitKillActive = false;
  tripleShotEndTime = 0;
  oneHitKillEndTime = 0;
  bullets = [];
  enemyBullets = [];
  particles = [];
  powerups = [];
  frameCount = 0;
  lastTimeUpdate = performance.now();
  attackingBee = null;
  attackCooldown = 0;
  screenShake = 0;

  createBeeFormation();
  document.getElementById('level').textContent = level;
  document.getElementById('timeLeft').textContent = timeLeft;
  updateUI();
  gameLoop();
}

function gameOver(won) {
  gameRunning = false;
  const endTitle = document.getElementById('endTitle');
  const endMessage = document.getElementById('endMessage');

  if (won) {
    endTitle.textContent = '🏆 任务完成！';
    endTitle.style.color = '#0f0';
    endMessage.innerHTML = `关卡: ${level}<br>得分: ${score}<br>剩余时间: ${timeLeft}秒<br>剩余生命: ${lives}`;
  } else {
    if (lives <= 0) {
      endTitle.textContent = '💥 战机坠毁';
      endTitle.style.color = '#f44';
      endMessage.innerHTML = `到达关卡: ${level}<br>最终得分: ${score}`;
    } else {
      endTitle.textContent = '⏰ 时间耗尽';
      endTitle.style.color = '#fa0';
      endMessage.innerHTML = `到达关卡: ${level}<br>得分: ${score}<br>剩余敌人: ${bees.filter(b => b.alive).length}`;
    }
  }

  document.getElementById('gameOver').style.display = 'flex';
}

function restartGame() {
  document.getElementById('gameOver').style.display = 'none';
  startGame();
}

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  initStars();
});
</script>
