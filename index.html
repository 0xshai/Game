<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>GameHub - 游戏中心</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a12;
  min-height: 100vh;
  font-family: 'Arial', 'Microsoft YaHei', sans-serif;
  overflow-x: hidden;
}

/* 背景 */
.bg-layer {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse at 20% 30%, rgba(0, 100, 200, 0.1) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 70%, rgba(150, 0, 200, 0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(10, 10, 20, 1) 0%, #050508 100%);
}
.grid-deco {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(0, 200, 255, 0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 200, 255, 0.015) 1px, transparent 1px);
  background-size: 60px 60px;
}

/* 主页面布局 */
.main-page {
  position: relative; z-index: 10;
  padding: 40px 20px;
  max-width: 1200px;
  margin: 0 auto;
}

/* 顶部 */
.header {
  text-align: center;
  margin-bottom: 50px;
}
.header h1 {
  color: #0ff;
  font-size: 42px;
  letter-spacing: 12px;
  text-shadow: 0 0 30px rgba(0, 255, 255, 0.4), 0 0 60px rgba(0, 255, 255, 0.2);
  margin-bottom: 10px;
}
.header .subtitle {
  color: rgba(255, 255, 255, 0.3);
  font-size: 14px;
  letter-spacing: 4px;
}

/* 分区标题 */
.section-title {
  color: rgba(255, 255, 255, 0.6);
  font-size: 16px;
  letter-spacing: 4px;
  margin-bottom: 25px;
  padding-left: 15px;
  border-left: 3px solid rgba(0, 255, 255, 0.4);
}

/* 游戏网格 */
.game-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 25px;
  max-width: 1100px;
  margin: 0 auto 60px;
}

/* 游戏卡片 */
.game-card {
  background: linear-gradient(145deg, rgba(20, 25, 40, 0.8), rgba(10, 15, 25, 0.9));
  border: 1px solid rgba(0, 255, 255, 0.12);
  border-radius: 16px;
  padding: 35px 25px;
  text-align: center;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  backdrop-filter: blur(10px);
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
  position: relative;
  overflow: hidden;
}
.game-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(0, 255, 255, 0.05), transparent);
  opacity: 0;
  transition: opacity 0.4s;
}
.game-card:hover {
  transform: translateY(-8px);
  border-color: rgba(0, 255, 255, 0.4);
  box-shadow: 0 12px 40px rgba(0, 255, 255, 0.15), 0 0 60px rgba(0, 255, 255, 0.05);
}
.game-card:hover::before { opacity: 1; }
.game-card .icon {
  font-size: 56px;
  margin-bottom: 18px;
  position: relative;
  z-index: 1;
}
.game-card h3 {
  color: #e0e0e0;
  font-size: 20px;
  margin-bottom: 10px;
  position: relative;
  z-index: 1;
  letter-spacing: 2px;
}
.game-card p {
  color: rgba(255, 255, 255, 0.4);
  font-size: 13px;
  position: relative;
  z-index: 1;
}

/* 即将上线卡片 */
.game-card.coming-soon {
  opacity: 0.45;
  cursor: not-allowed;
}
.game-card.coming-soon:hover {
  transform: none;
  border-color: rgba(0, 255, 255, 0.12);
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
}
.game-card.coming-soon::before { display: none; }
.game-card .coming-tag {
  display: inline-block;
  padding: 3px 12px;
  background: rgba(255, 200, 0, 0.15);
  color: #ffc800;
  border: 1px solid rgba(255, 200, 0, 0.3);
  border-radius: 20px;
  font-size: 11px;
  margin-top: 12px;
  letter-spacing: 1px;
  position: relative;
  z-index: 1;
}

/* 页脚 */
.footer {
  text-align: center;
  padding: 30px 0 40px;
  border-top: 1px solid rgba(255, 255, 255, 0.05);
  margin-top: 20px;
}
.footer .dev-name {
  color: rgba(0, 255, 255, 0.6);
  font-size: 18px;
  font-weight: bold;
  letter-spacing: 6px;
  text-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
  margin-bottom: 8px;
}
.footer .dev-label {
  color: rgba(255, 255, 255, 0.2);
  font-size: 12px;
  letter-spacing: 2px;
}

/* 游戏弹窗 */
.game-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.95);
  z-index: 1000;
  justify-content: center;
  align-items: center;
}
.game-modal.active { display: flex; }
.modal-content {
  position: relative;
  width: 90vw;
  height: 90vh;
  max-width: 1400px;
  max-height: 900px;
}
.modal-content iframe {
  width: 100%;
  height: 100%;
  border: none;
  border-radius: 12px;
  box-shadow: 0 0 60px rgba(0, 255, 255, 0.1), 0 10px 40px rgba(0, 0, 0, 0.5);
}
.close-btn {
  position: absolute;
  top: -50px;
  right: 0;
  background: rgba(255, 100, 100, 0.15);
  color: #ff6464;
  border: 1px solid rgba(255, 100, 100, 0.3);
  padding: 12px 24px;
  border-radius: 25px;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.3s;
  letter-spacing: 1px;
}
.close-btn:hover {
  background: rgba(255, 100, 100, 0.25);
  box-shadow: 0 0 20px rgba(255, 100, 100, 0.2);
}
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="grid-deco"></div>

<!-- 主页面 -->
<div class="main-page" id="mainPage">
  <div class="header">
    <h1>GAME HUB</h1>
    <div class="subtitle">游 戏 中 心</div>
  </div>

  <div class="section-title">在线游戏</div>
  <div class="game-grid">
    <!-- 游戏1：打蜜蜂 -->
    <div class="game-card" onclick="openGame('bee_shooter.html')">
      <div class="icon">🐝</div>
      <h3>星际蜂巢</h3>
      <p>控制战机消灭外星蜂群</p>
    </div>

    <!-- 游戏2：五子棋 -->
    <div class="game-card" onclick="openGame('gomoku.html')">
      <div class="icon">⚫</div>
      <h3>五子棋</h3>
      <p>霓虹风格五子连珠</p>
    </div>

    <!-- 游戏3：围棋 -->
    <div class="game-card" onclick="openGame('go_game.html')">
      <div class="icon">⚪</div>
      <h3>围棋</h3>
      <p>1-10级AI人机对弈</p>
    </div>

    <!-- 游戏4：打地鼠 -->
    <div class="game-card" onclick="openGame('whack_a_mole.html')">
      <div class="icon">🔨</div>
      <h3>打地鼠</h3>
      <p>奇幻森林连击挑战</p>
    </div>

    <!-- 游戏5：俄罗斯方块 -->
    <div class="game-card" onclick="openGame('tetris.html')">
      <div class="icon">🧩</div>
      <h3>俄罗斯方块</h3>
      <p>霓虹消行挑战</p>
    </div>
  </div>

  <div class="section-title">即将上线</div>
  <div class="game-grid">


    <!-- 即将上线2 -->
    <div class="game-card coming-soon">
      <div class="icon">🃏</div>
      <h3>纸牌接龙</h3>
      <p>经典纸牌游戏</p>
      <div class="coming-tag">即将上线</div>
    </div>

    <!-- 即将上线3 -->
    <div class="game-card coming-soon">
      <div class="icon">💣</div>
      <h3>扫雷</h3>
      <p>逻辑推理排雷</p>
      <div class="coming-tag">即将上线</div>
    </div>

    <!-- 即将上线4 -->
    <div class="game-card coming-soon">
      <div class="icon">🐍</div>
      <h3>贪吃蛇</h3>
      <p>经典贪吃蛇大作战</p>
      <div class="coming-tag">即将上线</div>
    </div>
  </div>

  <!-- 页脚 -->
  <div class="footer">
    <div class="dev-name">SHAIFX</div>
    <div class="dev-label">DEVELOPER</div>
  </div>
</div>

<!-- 游戏弹窗 -->
<div class="game-modal" id="gameModal">
  <div class="modal-content">
    <button class="close-btn" onclick="closeGame()">✕ 关闭 (ESC)</button>
    <iframe id="gameFrame" src=""></iframe>
  </div>
</div>

<script>
function openGame(gameUrl) {
  const modal = document.getElementById('gameModal');
  const frame = document.getElementById('gameFrame');
  frame.src = gameUrl;
  modal.classList.add('active');
}

function closeGame() {
  const modal = document.getElementById('gameModal');
  const frame = document.getElementById('gameFrame');
  frame.src = '';
  modal.classList.remove('active');
}

document.addEventListener('keydown', (e) => {
  if (e.code === 'Escape') closeGame();
});

document.getElementById('gameModal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeGame();
});
</script>

</body>
</html>
