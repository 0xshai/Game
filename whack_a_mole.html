<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>打地鼠</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(135deg, #2d5016 0%, #4a7c23 100%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
}
.game-container {
  text-align: center;
}
h1 {
  color: #fff;
  margin-bottom: 20px;
  font-size: 36px;
  text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
}
.info-panel {
  display: flex;
  justify-content: space-around;
  align-items: center;
  max-width: 600px;
  margin: 0 auto 20px;
  padding: 15px 20px;
  background: rgba(255, 255, 255, 0.15);
  border-radius: 10px;
  backdrop-filter: blur(10px);
}
.info-item {
  color: #fff;
  font-size: 18px;
}
.info-item span {
  font-weight: bold;
  font-size: 24px;
  color: #ffd700;
}
button {
  padding: 12px 24px;
  font-size: 16px;
  background: #e94560;
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.3s;
  font-weight: bold;
}
button:hover {
  background: #c73e54;
}
button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.game-board {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  max-width: 500px;
  margin: 0 auto;
  padding: 30px;
  background: rgba(139, 90, 43, 0.3);
  border-radius: 15px;
}
.hole {
  width: 140px;
  height: 140px;
  background: radial-gradient(ellipse at center, #3d2817 0%, #5c3d1e 70%);
  border-radius: 50%;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  box-shadow: inset 0 10px 20px rgba(0, 0, 0, 0.5);
}
.mole {
  position: absolute;
  bottom: -100%;
  left: 50%;
  transform: translateX(-50%);
  width: 100px;
  height: 100px;
  transition: bottom 0.3s ease-out;
}
.mole.show {
  bottom: 10%;
}
.mole-body {
  width: 100%;
  height: 100%;
  background: radial-gradient(ellipse at 30% 30%, #8b6914 0%, #654321 100%);
  border-radius: 50% 50% 40% 40%;
  position: relative;
}
.mole-eye {
  position: absolute;
  width: 12px;
  height: 12px;
  background: #000;
  border-radius: 50%;
  top: 30px;
}
.mole-eye.left { left: 25px; }
.mole-eye.right { right: 25px; }
.mole-eye::after {
  content: '';
  position: absolute;
  width: 4px;
  height: 4px;
  background: #fff;
  border-radius: 50%;
  top: 2px;
  left: 2px;
}
.mole-nose {
  position: absolute;
  width: 20px;
  height: 15px;
  background: #ff6b6b;
  border-radius: 50%;
  top: 45px;
  left: 50%;
  transform: translateX(-50%);
}
.mole-mouth {
  position: absolute;
  width: 30px;
  height: 10px;
  border-bottom: 3px solid #000;
  border-radius: 0 0 50% 50%;
  top: 58px;
  left: 50%;
  transform: translateX(-50%);
}
.hit-effect {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 40px;
  color: #ffd700;
  font-weight: bold;
  pointer-events: none;
  animation: hitAnim 0.5s ease-out forwards;
}
@keyframes hitAnim {
  0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
  50% { transform: translate(-50%, -80%) scale(1.2); }
  100% { opacity: 0; transform: translate(-50%, -120%) scale(1); }
}
#result {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.8);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 100;
}
#result.active {
  display: flex;
}
.result-content {
  background: #fff;
  padding: 40px 60px;
  border-radius: 15px;
  text-align: center;
}
.result-content h2 {
  font-size: 36px;
  margin-bottom: 20px;
  color: #2d5016;
}
.result-content p {
  font-size: 20px;
  margin-bottom: 10px;
  color: #333;
}
.result-content button {
  margin-top: 20px;
  padding: 12px 30px;
  font-size: 18px;
}
.difficulty-selector {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  justify-content: center;
}
.diff-btn {
  padding: 8px 16px;
  font-size: 14px;
  background: rgba(255, 255, 255, 0.2);
  color: #fff;
  border: 2px solid rgba(255, 255, 255, 0.3);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.3s;
}
.diff-btn.active {
  background: #e94560;
  border-color: #e94560;
}
.diff-btn:hover {
  background: rgba(255, 255, 255, 0.3);
}
.diff-btn.active:hover {
  background: #c73e54;
}
</style>
</head>
<body>

<div class="game-container">
  <h1>打地鼠</h1>
  <div class="difficulty-selector">
    <button class="diff-btn active" onclick="setDifficulty('easy')">简单</button>
    <button class="diff-btn" onclick="setDifficulty('normal')">普通</button>
    <button class="diff-btn" onclick="setDifficulty('hard')">困难</button>
  </div>
  <div class="info-panel">
    <div class="info-item">得分: <span id="score">0</span></div>
    <button id="startBtn" onclick="startGame()">开始游戏</button>
    <div class="info-item">时间: <span id="timer">30</span>s</div>
  </div>
  <div class="game-board" id="gameBoard"></div>
</div>

<div id="result">
  <div class="result-content">
    <h2>游戏结束！</h2>
    <p>最终得分: <span id="finalScore">0</span></p>
    <p id="rankText"></p>
    <button onclick="restartGame()">再来一局</button>
  </div>
</div>

<script>
// 游戏配置
const difficulties = {
  easy: { moleTime: 1500, spawnInterval: 1200, gameTime: 30 },
  normal: { moleTime: 1000, spawnInterval: 800, gameTime: 30 },
  hard: { moleTime: 700, spawnInterval: 600, gameTime: 30 }
};

let currentDifficulty = 'easy';
let score = 0;
let timeLeft = 30;
let gameRunning = false;
let spawnTimer = null;
let countdownTimer = null;
let moles = [];

// 初始化游戏板
function initBoard() {
  const board = document.getElementById('gameBoard');
  board.innerHTML = '';
  moles = [];

  for (let i = 0; i < 9; i++) {
    const hole = document.createElement('div');
    hole.className = 'hole';
    hole.dataset.index = i;

    const mole = document.createElement('div');
    mole.className = 'mole';
    mole.innerHTML = `
      <div class="mole-body">
        <div class="mole-eye left"></div>
        <div class="mole-eye right"></div>
        <div class="mole-nose"></div>
        <div class="mole-mouth"></div>
      </div>
    `;

    hole.appendChild(mole);
    board.appendChild(hole);
    moles.push({ element: mole, active: false });

    // 点击事件
    hole.addEventListener('click', () => whackMole(i));
  }
}

// 设置难度
function setDifficulty(diff) {
  currentDifficulty = diff;
  document.querySelectorAll('.diff-btn').forEach(btn => {
    btn.classList.remove('active');
  });
  event.target.classList.add('active');
  
  if (!gameRunning) {
    timeLeft = difficulties[diff].gameTime;
    document.getElementById('timer').textContent = timeLeft;
  }
}

// 开始游戏
function startGame() {
  if (gameRunning) return;

  gameRunning = true;
  score = 0;
  timeLeft = difficulties[currentDifficulty].gameTime;
  
  document.getElementById('score').textContent = score;
  document.getElementById('timer').textContent = timeLeft;
  document.getElementById('startBtn').disabled = true;
  document.getElementById('result').classList.remove('active');

  // 重置所有地鼠
  moles.forEach(mole => {
    mole.element.classList.remove('show');
    mole.active = false;
  });

  // 开始生成地鼠
  const config = difficulties[currentDifficulty];
  spawnTimer = setInterval(spawnMole, config.spawnInterval);
  
  // 倒计时
  countdownTimer = setInterval(() => {
    timeLeft--;
    document.getElementById('timer').textContent = timeLeft;
    
    if (timeLeft <= 0) {
      endGame();
    }
  }, 1000);
}

// 生成地鼠
function spawnMole() {
  if (!gameRunning) return;

  // 随机选择一个洞
  const availableHoles = moles.filter(m => !m.active);
  if (availableHoles.length === 0) return;

  const randomIndex = Math.floor(Math.random() * availableHoles.length);
  const mole = availableHoles[randomIndex];
  
  mole.active = true;
  mole.element.classList.add('show');

  // 地鼠停留时间后消失
  const config = difficulties[currentDifficulty];
  setTimeout(() => {
    if (mole.active) {
      mole.element.classList.remove('show');
      mole.active = false;
    }
  }, config.moleTime);
}

// 打地鼠
function whackMole(index) {
  if (!gameRunning) return;
  
  const mole = moles[index];
  if (!mole.active) return;

  // 击中地鼠
  mole.active = false;
  mole.element.classList.remove('show');
  
  // 增加分数
  score += 10;
  document.getElementById('score').textContent = score;

  // 显示击中效果
  showHitEffect(index);
  
  // 播放音效（使用Web Audio API）
  playHitSound();
}

// 显示击中效果
function showHitEffect(index) {
  const hole = document.querySelectorAll('.hole')[index];
  const effect = document.createElement('div');
  effect.className = 'hit-effect';
  effect.textContent = '+10';
  hole.appendChild(effect);
  
  setTimeout(() => effect.remove(), 500);
}

// 播放击中音效
function playHitSound() {
  try {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();

    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    oscillator.type = 'square';
    oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
    oscillator.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.1);

    gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

    oscillator.start(audioCtx.currentTime);
    oscillator.stop(audioCtx.currentTime + 0.1);
  } catch (e) {
    // 忽略音频错误
  }
}

// 游戏结束
function endGame() {
  gameRunning = false;
  clearInterval(spawnTimer);
  clearInterval(countdownTimer);

  document.getElementById('startBtn').disabled = false;
  document.getElementById('finalScore').textContent = score;

  // 评级
  let rank = '';
  if (score >= 300) rank = '传说级猎手！';
  else if (score >= 200) rank = '大师级猎手！';
  else if (score >= 150) rank = '优秀猎手！';
  else if (score >= 100) rank = '合格猎手';
  else if (score >= 50) rank = '新手猎手';
  else rank = '继续加油！';
  
  document.getElementById('rankText').textContent = rank;
  document.getElementById('result').classList.add('active');

  // 隐藏所有地鼠
  moles.forEach(mole => {
    mole.element.classList.remove('show');
    mole.active = false;
  });
}

// 重新开始
function restartGame() {
  document.getElementById('result').classList.remove('active');
  startGame();
}

// ESC键重新开始
document.addEventListener('keydown', (e) => {
  if (e.code === 'Escape' && gameRunning) {
    endGame();
  }
});

// 初始化
initBoard();
</script>

</body>
</html>
